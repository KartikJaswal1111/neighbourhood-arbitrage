version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Neighbourhood Arbitrage Engine — Docker Compose
#
#  DEMO MODE (default, zero cost):
#    docker compose up --build
#
#  REAL AI MODE (requires Anthropic API key):
#    ANTHROPIC_API_KEY=sk-ant-... USE_MOCK_AGENT=false USE_MOCK_VISION=false \
#    docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI + SQLite backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # ── Demo mode (zero cost) ──────────────────────────────────────────────
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-mock-key-not-needed}"
      USE_MOCK_VISION: "${USE_MOCK_VISION:-true}"
      USE_MOCK_AGENT: "${USE_MOCK_AGENT:-true}"
      # ── Database & model ───────────────────────────────────────────────────
      DATABASE_URL: "sqlite:///./arbitrage.db"
      CLAUDE_MODEL: "claude-sonnet-4-6"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Next.js 14 frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Browser fetches go to the host-mapped port, not the Docker network name
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      backend:
        condition: service_healthy
